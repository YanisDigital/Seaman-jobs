# ============================================================================
# Конфигурация сборщика вакансий моряков
# ============================================================================
#
# Фильтрация: вакансия попадает в результат, если её ДОЛЖНОСТЬ совпала хотя бы
# с одним ключевым словом из `positions` И её ТИП СУДНА совпал хотя бы с одним
# из `vessel_types`.
#
# Совпадение — регистронезависимое, по подстроке. Чтобы учесть синонимы,
# просто добавьте их отдельными строками (например, и "master", и "captain").
#
# Пустой список = НЕ фильтровать по этому параметру (берём все значения).
# ----------------------------------------------------------------------------

# Нужные должности (ключевые слова). Примеры синонимов закомментированы.
positions:
  # -  master
  # - captain
  - chief officer
  # - "c/o"
  # -  chief engineer
  # -  "2nd officer"
  # -  "2nd engineer"

# Нужные типы судов (ключевые слова).
vessel_types:
  # - bulk
  - container
  - general cargo
  # - tanker
  # - reefer

# Какие сайты опрашивать. Уберите ненужные из списка.
# Доступно: crewell, ukrcrewing, maritime_zone
sites:
  - crewell
  - ukrcrewing
  - maritime_zone
  - crewdata
  - crewplanet

# Сетевые настройки и поведение скрейпера.
request:
  delay_seconds: 1.0 # пауза между запросами (вежливость к сайтам)
  timeout: 25 # таймаут запроса, сек
  retries: 3 # число повторов при сетевой ошибке/5xx/429
  max_pages_per_site: 0 # 0 = все страницы; >0 = ограничить (полезно для теста)
  fetch_details: true # дозагружать страницы-детали для совпавших вакансий

# Куда сохранять Excel-файлы.
output_dir: output

# Настройки maritime-zone (Cloudflare). Требует установленного playwright.
maritime_zone:
  enabled: true # false — пропустить этот сайт без ошибки
  headless: true # false — показать окно браузера (иногда помогает пройти проверку)
  challenge_wait: 25 # сколько секунд максимум ждать прохождения Cloudflare
